# conf-papers skill 专用配置

# 感兴趣的关键词（用于从顶会论文中筛选）
keywords:
  - "large language model"
  - "LLM"
  - "pre-training"
  - "fine-tuning"
  - "foundation model"
  - "transformer"
  - "instruction tuning"
  - "RLHF"
  - "alignment"
  - "reasoning"
  - "chain-of-thought"
  - "in-context learning"
  - "scaling law"

# 排除的关键词
excluded_keywords:
  - "3D"
  - "review"
  - "workshop"
  - "survey"
  - "tutorial"

# 默认搜索年份（命令行参数可覆盖）
default_year: 2025

# 默认搜索的会议（命令行参数可覆盖，大小写均支持）
# 可选: CVPR, ICCV, ECCV, ICLR, AAAI, NeurIPS, ICML
default_conferences:
  - "ICLR"
  - "NeurIPS"
  - "ICML"
  - "CVPR"

# 返回的论文数量
top_n: 10
